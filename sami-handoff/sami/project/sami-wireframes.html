<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>sami — Wireframe Explorations</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1a1a1a; font-family: 'Space Grotesk', sans-serif; }
  .sketch { font-family: 'Caveat', cursive; }
</style>
</head>
<body>
<script type="text/babel">

/* ── Shared design tokens (from codebase) ── */
const C = {
  bg: '#121212',
  card: '#1E1E1E',
  cardElevated: '#2C2C2C',
  border: '#2C2C2C',
  text: '#FFFFFF',
  textDim: '#9E9E9E',
  teal: '#00C9A7',
  tealDim: 'rgba(0,201,167,0.15)',
  tealDimBorder: 'rgba(0,201,167,0.35)',
  purple: '#8B5CF6',
  coral: '#FF6B6B',
  orange: '#FF9F43',
  blue: '#4ECDC4',
  yellow: '#FFD93D',
  separator: '#2C2C2C',
}

/* ── Mini helpers ── */
const AppDot = ({ name, color, size = 36 }) => {
  const initials = name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase()
  return (
    <div style={{
      width: size, height: size, borderRadius: size * 0.22,
      background: color, display:'flex', alignItems:'center', justifyContent:'center',
      flexShrink: 0, fontSize: size * 0.33, fontWeight: 700, color: '#fff',
      letterSpacing: '-0.5px', fontFamily: 'Space Grotesk',
      boxShadow: `0 2px 8px ${color}55`
    }}>{initials}</div>
  )
}

const Toggle = ({ on = false, small = false }) => {
  const w = small ? 30 : 38, h = small ? 18 : 22
  return (
    <div style={{
      width: w, height: h, borderRadius: h,
      background: on ? C.teal : C.cardElevated,
      position:'relative', flexShrink: 0,
      border: `1.5px solid ${on ? C.teal : C.border}`,
      transition:'background 0.2s'
    }}>
      <div style={{
        position:'absolute', top: 2, left: on ? w - h + 2 : 2,
        width: h - 4, height: h - 4, borderRadius: '50%',
        background: '#fff', transition:'left 0.2s',
        boxShadow: '0 1px 3px rgba(0,0,0,0.4)'
      }}/>
    </div>
  )
}

const Pill = ({ label, color = C.teal }) => (
  <div style={{
    display:'inline-flex', alignItems:'center', gap: 4,
    padding:'3px 8px', borderRadius: 20,
    background: `${color}22`, border:`1px solid ${color}55`,
    fontSize: 10, fontWeight: 600, color,
    fontFamily:'Space Grotesk', whiteSpace:'nowrap'
  }}>{label}</div>
)

const SectionLabel = ({ children }) => (
  <div className="sketch" style={{ fontSize: 13, color: C.textDim, marginBottom: 6, paddingLeft: 2 }}>
    {children}
  </div>
)

const Annotation = ({ children, style = {} }) => (
  <div className="sketch" style={{
    fontSize: 12, color: '#aaa', lineHeight: 1.4,
    fontStyle:'italic', ...style
  }}>{children}</div>
)

/* ═══════════════════════════════════════════
   DASHBOARD DIRECTION A — "Calm Focus"
   Centered ring, minimal stats, grouped list
═══════════════════════════════════════════ */
const DashA = () => {
  const r = 52, cx = 70, cy = 70
  const circumference = 2 * Math.PI * r
  const progress = 0.73
  return (
    <div style={{ background: C.bg, height:'100%', padding:'0 16px', overflowY:'auto', paddingBottom: 24 }}>
      {/* Header */}
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', paddingTop: 12, marginBottom: 20 }}>
        <div style={{ fontSize: 22, fontWeight: 700, color: C.text, letterSpacing:'-0.5px' }}>sami</div>
        <div style={{ display:'flex', gap: 12, alignItems:'center' }}>
          <div style={{ width: 28, height: 28, borderRadius: 8, background: C.card, display:'flex', alignItems:'center', justifyContent:'center' }}>
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <circle cx="7" cy="7" r="6" stroke={C.textDim} strokeWidth="1.5"/>
              <path d="M7 4v3l2 1" stroke={C.textDim} strokeWidth="1.5" strokeLinecap="round"/>
            </svg>
          </div>
          <div style={{ width: 28, height: 28, borderRadius: 8, background: C.card, display:'flex', alignItems:'center', justifyContent:'center' }}>
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M2 4h10M2 7h10M2 10h6" stroke={C.textDim} strokeWidth="1.5" strokeLinecap="round"/>
            </svg>
          </div>
        </div>
      </div>

      {/* Focus ring hero */}
      <div style={{ display:'flex', flexDirection:'column', alignItems:'center', marginBottom: 20 }}>
        <div style={{ position:'relative', width: 140, height: 140, marginBottom: 12 }}>
          <svg width="140" height="140" style={{ transform:'rotate(-90deg)' }}>
            <circle cx="70" cy="70" r={r} stroke={C.cardElevated} strokeWidth="10" fill="none"/>
            <circle cx="70" cy="70" r={r} stroke={C.teal} strokeWidth="10" fill="none"
              strokeDasharray={circumference}
              strokeDashoffset={circumference * (1 - progress)}
              strokeLinecap="round"/>
          </svg>
          <div style={{ position:'absolute', inset:0, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center' }}>
            <div style={{ fontSize: 28, fontWeight: 700, color: C.text, lineHeight: 1 }}>73</div>
            <div style={{ fontSize: 10, color: C.textDim, marginTop: 2 }}>focus score</div>
          </div>
        </div>

        {/* Stat row */}
        <div style={{ display:'flex', gap: 16 }}>
          {[
            { val:'2h 14m', label:'saved today' },
            { val:'🔥 12', label:'day streak' },
          ].map(s => (
            <div key={s.label} style={{ textAlign:'center' }}>
              <div style={{ fontSize: 15, fontWeight: 600, color: C.text }}>{s.val}</div>
              <div style={{ fontSize: 10, color: C.textDim }}>{s.label}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Schedule group: Weekdays */}
      <div style={{ marginBottom: 10 }}>
        <div style={{ display:'flex', alignItems:'center', gap: 8, marginBottom: 8 }}>
          <Pill label="Weekdays  9am–6pm" color={C.teal} />
          <div style={{ fontSize: 10, color: C.textDim }}>2 apps</div>
        </div>
        <div style={{ background: C.card, borderRadius: 14, overflow:'hidden', border:`1px solid ${C.border}` }}>
          {[
            { name:'Instagram', color:'#E1306C' },
            { name:'X (Twitter)', color:'#000', border:'#333' },
          ].map((app, i) => (
            <div key={app.name} style={{
              display:'flex', alignItems:'center', gap: 12, padding:'11px 14px',
              borderBottom: i === 0 ? `1px solid ${C.separator}` : 'none'
            }}>
              <AppDot name={app.name} color={app.color} />
              <span style={{ flex:1, fontSize: 14, fontWeight: 500, color: C.text }}>{app.name}</span>
              <Toggle on={false} />
            </div>
          ))}
        </div>
      </div>

      {/* Schedule group: Always */}
      <div style={{ marginBottom: 10 }}>
        <div style={{ display:'flex', alignItems:'center', gap: 8, marginBottom: 8 }}>
          <Pill label="Always" color={C.coral} />
          <div style={{ fontSize: 10, color: C.textDim }}>2 apps · active</div>
        </div>
        <div style={{ background: C.card, borderRadius: 14, overflow:'hidden', border:`1px solid ${C.tealDimBorder}` }}>
          {[
            { name:'Facebook', color:'#1877F2', on: true },
            { name:'Safari', color:'#006CFF', on: true },
          ].map((app, i) => (
            <div key={app.name} style={{
              display:'flex', alignItems:'center', gap: 12, padding:'11px 14px',
              borderBottom: i === 0 ? `1px solid ${C.separator}` : 'none'
            }}>
              <AppDot name={app.name} color={app.color} />
              <span style={{ flex:1, fontSize: 14, fontWeight: 500, color: C.text }}>{app.name}</span>
              <Toggle on={true} />
            </div>
          ))}
        </div>
      </div>

      {/* Ungrouped */}
      <div style={{ marginBottom: 8 }}>
        <SectionLabel>Not in a schedule</SectionLabel>
        <div style={{ background: C.card, borderRadius: 14, overflow:'hidden', border:`1px solid ${C.border}` }}>
          {[
            { name:'Snapchat', color:'#FFCC00' },
            { name:'Apple News', color:'#FF3B30' },
          ].map((app, i, arr) => (
            <div key={app.name} style={{
              display:'flex', alignItems:'center', gap: 12, padding:'11px 14px',
              borderBottom: i < arr.length-1 ? `1px solid ${C.separator}` : 'none'
            }}>
              <AppDot name={app.name} color={app.color} />
              <span style={{ flex:1, fontSize: 14, fontWeight: 500, color: C.text }}>{app.name}</span>
              <Toggle on={false} />
            </div>
          ))}
        </div>
      </div>

      {/* Add button */}
      <div style={{ display:'flex', justifyContent:'center', marginTop: 16 }}>
        <div style={{ display:'flex', alignItems:'center', gap: 8, padding:'10px 24px', borderRadius: 24, background: C.teal, color:'#000', fontSize: 13, fontWeight: 700 }}>
          <span>+</span> Block an App
        </div>
      </div>
    </div>
  )
}

/* ═══════════════════════════════════════════
   DASHBOARD DIRECTION B — "Stats Dashboard"
   Bold metric cards up top, schedule cards below
═══════════════════════════════════════════ */
const DashB = () => (
  <div style={{ background: C.bg, height:'100%', padding:'0 16px', overflowY:'auto', paddingBottom: 24 }}>
    {/* Header */}
    <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', paddingTop: 12, marginBottom: 16 }}>
      <div>
        <div style={{ fontSize: 12, color: C.textDim, letterSpacing: 1, textTransform:'uppercase' }}>Monday, Apr 28</div>
        <div style={{ fontSize: 20, fontWeight: 700, color: C.text, letterSpacing:'-0.5px' }}>sami</div>
      </div>
      <div style={{ width: 32, height: 32, borderRadius: 10, background: C.teal, display:'flex', alignItems:'center', justifyContent:'center' }}>
        <span style={{ fontSize: 16 }}>+</span>
      </div>
    </div>

    {/* 3-metric row */}
    <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap: 8, marginBottom: 16 }}>
      {[
        { icon:'🔥', val:'12', label:'Day streak' },
        { icon:'⏱', val:'2h 14m', label:'Saved today' },
        { icon:'✦', val:'73', label:'Focus score' },
      ].map(m => (
        <div key={m.label} style={{
          background: C.card, borderRadius: 12, padding:'10px 8px', textAlign:'center',
          border:`1px solid ${C.border}`
        }}>
          <div style={{ fontSize: 18, marginBottom: 4 }}>{m.icon}</div>
          <div style={{ fontSize: 13, fontWeight: 700, color: C.text, lineHeight: 1 }}>{m.val}</div>
          <div style={{ fontSize: 9, color: C.textDim, marginTop: 3 }}>{m.label}</div>
        </div>
      ))}
    </div>

    {/* Schedule group cards */}
    {[
      { label:'Weekdays', sub:'9am – 6pm', color: C.teal, active: false, apps:[{name:'Instagram',color:'#E1306C'},{name:'X (Twitter)',color:'#000'}] },
      { label:'Always', sub:'Blocking now', color: C.coral, active: true, apps:[{name:'Facebook',color:'#1877F2'},{name:'Safari',color:'#006CFF'}] },
    ].map(group => (
      <div key={group.label} style={{
        background: C.card, borderRadius: 16, marginBottom: 10, overflow:'hidden',
        border:`1px solid ${group.active ? group.color+'66' : C.border}`
      }}>
        {/* Group header */}
        <div style={{
          display:'flex', alignItems:'center', justifyContent:'space-between',
          padding:'10px 14px', background: group.active ? `${group.color}18` : 'transparent',
          borderBottom:`1px solid ${C.separator}`
        }}>
          <div style={{ display:'flex', alignItems:'center', gap: 8 }}>
            <div style={{ width: 8, height: 8, borderRadius: '50%', background: group.color, boxShadow:`0 0 6px ${group.color}` }}/>
            <span style={{ fontSize: 13, fontWeight: 700, color: C.text }}>{group.label}</span>
            <span style={{ fontSize: 11, color: C.textDim }}>{group.sub}</span>
          </div>
          <div style={{ display:'flex', gap: 6 }}>
            {group.apps.map(a => <AppDot key={a.name} name={a.name} color={a.color} size={22} />)}
          </div>
        </div>
        {/* App rows */}
        {group.apps.map((app, i) => (
          <div key={app.name} style={{
            display:'flex', alignItems:'center', gap: 12, padding:'10px 14px',
            borderBottom: i < group.apps.length-1 ? `1px solid ${C.separator}` : 'none'
          }}>
            <AppDot name={app.name} color={app.color} />
            <span style={{ flex:1, fontSize: 14, fontWeight: 500, color: C.text }}>{app.name}</span>
            <Toggle on={group.active} />
          </div>
        ))}
      </div>
    ))}

    {/* Ungrouped flat list */}
    <SectionLabel>No schedule</SectionLabel>
    <div style={{ background: C.card, borderRadius: 14, overflow:'hidden', border:`1px solid ${C.border}` }}>
      {[
        { name:'Snapchat', color:'#FFCC00' },
        { name:'Apple News', color:'#FF3B30' },
      ].map((app, i, arr) => (
        <div key={app.name} style={{
          display:'flex', alignItems:'center', gap: 12, padding:'10px 14px',
          borderBottom: i < arr.length-1 ? `1px solid ${C.separator}` : 'none'
        }}>
          <AppDot name={app.name} color={app.color} />
          <span style={{ flex:1, fontSize: 14, fontWeight: 500, color: C.text }}>{app.name}</span>
          <Toggle on={false} />
        </div>
      ))}
    </div>
  </div>
)

/* ═══════════════════════════════════════════
   DASHBOARD DIRECTION C — "Mindful"
   Ambient gradient top section, streaks + 
   session-style schedule groups as full cards
═══════════════════════════════════════════ */
const DashC = () => (
  <div style={{ background: C.bg, height:'100%', overflowY:'auto', paddingBottom: 24 }}>
    {/* Hero gradient top */}
    <div style={{
      background:`linear-gradient(160deg, #0f2622 0%, #121212 60%)`,
      padding:'12px 16px 20px',
      borderBottom:`1px solid ${C.tealDimBorder}`
    }}>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom: 16 }}>
        <div style={{ fontSize: 20, fontWeight: 700, color: C.text }}>sami</div>
        <div style={{ fontSize: 12, color: C.teal, fontWeight: 600 }}>Settings</div>
      </div>

      {/* Streak + motivation */}
      <div style={{ marginBottom: 14 }}>
        <div style={{ fontSize: 11, color: C.teal, fontWeight: 600, letterSpacing: 1, textTransform:'uppercase', marginBottom: 4 }}>
          🔥 12-day streak
        </div>
        <div style={{ fontSize: 17, fontWeight: 600, color: C.text, lineHeight: 1.3 }}>
          You've saved <span style={{ color: C.teal }}>2h 14m</span> today
        </div>
        <div style={{ fontSize: 12, color: C.textDim, marginTop: 4 }}>
          Keep it up — 73 focus score this week
        </div>
      </div>

      {/* Mini bar chart */}
      <div style={{ display:'flex', alignItems:'flex-end', gap: 4, height: 32 }}>
        {[0.4,0.6,0.9,0.7,0.85,0.5,1.0].map((h, i) => (
          <div key={i} style={{
            flex: 1, borderRadius: 3,
            background: i === 6 ? C.teal : `${C.teal}44`,
            height:`${h * 100}%`
          }}/>
        ))}
      </div>
      <div style={{ display:'flex', justifyContent:'space-between', marginTop: 4 }}>
        {['M','T','W','T','F','S','S'].map((d,i) => (
          <div key={i} style={{ flex:1, textAlign:'center', fontSize: 9, color: i===6 ? C.teal : C.textDim }}>{d}</div>
        ))}
      </div>
    </div>

    {/* Schedule group cards */}
    <div style={{ padding:'14px 16px 0' }}>
      {[
        {
          label:'Weekdays', time:'9am – 6pm', color: C.teal, icon:'⏰',
          status:'Starts in 21h', active: false,
          apps:[{name:'Instagram',color:'#E1306C'},{name:'X (Twitter)',color:'#000'}]
        },
        {
          label:'Always On', time:'Blocking now', color: C.coral, icon:'🚫',
          status:'2 apps blocked', active: true,
          apps:[{name:'Facebook',color:'#1877F2'},{name:'Safari',color:'#006CFF'}]
        },
      ].map(group => (
        <div key={group.label} style={{
          background: C.card, borderRadius: 16, marginBottom: 10, overflow:'hidden',
          border:`1.5px solid ${group.active ? group.color+'55' : C.border}`
        }}>
          <div style={{
            padding:'12px 14px',
            background: group.active ? `${group.color}10` : 'transparent',
            borderBottom:`1px solid ${C.separator}`
          }}>
            <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom: 4 }}>
              <div style={{ display:'flex', alignItems:'center', gap: 6 }}>
                <span style={{ fontSize: 14 }}>{group.icon}</span>
                <span style={{ fontSize: 14, fontWeight: 700, color: C.text }}>{group.label}</span>
              </div>
              <Pill label={group.status} color={group.active ? group.color : C.textDim} />
            </div>
            <div style={{ fontSize: 11, color: C.textDim }}>{group.time}</div>
          </div>
          <div style={{ display:'flex', alignItems:'center', padding:'10px 14px', gap: 10 }}>
            <div style={{ display:'flex', gap: 6 }}>
              {group.apps.map(a => <AppDot key={a.name} name={a.name} color={a.color} size={32} />)}
            </div>
            <div style={{ flex:1, fontSize: 11, color: C.textDim }}>{group.apps.map(a=>a.name).join(', ')}</div>
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M6 4l4 4-4 4" stroke={C.textDim} strokeWidth="1.5" strokeLinecap="round"/>
            </svg>
          </div>
        </div>
      ))}

      {/* Loose apps */}
      <SectionLabel>No schedule</SectionLabel>
      <div style={{ background: C.card, borderRadius: 14, overflow:'hidden', border:`1px solid ${C.border}` }}>
        {[
          { name:'Snapchat', color:'#FFCC00' },
          { name:'Apple News', color:'#FF3B30' },
        ].map((app, i, arr) => (
          <div key={app.name} style={{
            display:'flex', alignItems:'center', gap: 12, padding:'10px 14px',
            borderBottom: i < arr.length-1 ? `1px solid ${C.separator}` : 'none'
          }}>
            <AppDot name={app.name} color={app.color} />
            <span style={{ flex:1, fontSize: 14, fontWeight: 500, color: C.text }}>{app.name}</span>
            <Toggle on={false} />
          </div>
        ))}
      </div>

      {/* Add */}
      <div style={{ marginTop: 14, padding:'11px', borderRadius: 12, background: C.cardElevated, display:'flex', justifyContent:'center', alignItems:'center', gap: 8, border:`1px dashed ${C.border}` }}>
        <span style={{ fontSize: 16, color: C.teal }}>+</span>
        <span style={{ fontSize: 13, color: C.textDim }}>Block an App</span>
      </div>
    </div>
  </div>
)

/* ═══════════════════════════════════════════
   BLOCK AN APP SHEET — Redesigned
═══════════════════════════════════════════ */
const BlockSheet = () => {
  const categories = [
    { label:'Social', apps:[
      {name:'Instagram',color:'#E1306C'},{name:'TikTok',color:'#010101',border:'#333'},{name:'X (Twitter)',color:'#000',border:'#333'},
      {name:'Facebook',color:'#1877F2'},{name:'Snapchat',color:'#FFCC00'},{name:'Pinterest',color:'#E60023'},
    ]},
    { label:'Video', apps:[
      {name:'YouTube',color:'#FF0000'},{name:'Twitch',color:'#9146FF'},{name:'Netflix',color:'#E50914'},
      {name:'Hulu',color:'#1CE783'},{name:'Disney+',color:'#0063E5'},
    ]},
    { label:'Gaming', apps:[
      {name:'Roblox',color:'#E8281A'},{name:'Minecraft',color:'#62B47A'},{name:'Chess.com',color:'#7FA650'},
    ]},
  ]
  return (
    <div style={{ background: C.bg, height:'100%', display:'flex', flexDirection:'column' }}>
      {/* Sheet handle */}
      <div style={{ display:'flex', justifyContent:'center', padding:'10px 0 2px' }}>
        <div style={{ width: 36, height: 4, borderRadius: 2, background: C.border }}/>
      </div>

      {/* Header */}
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'8px 16px 10px' }}>
        <div style={{ fontSize: 17, fontWeight: 700, color: C.text }}>Block an App</div>
        <div style={{ fontSize: 13, color: C.teal, fontWeight: 600 }}>Done (2)</div>
      </div>

      {/* Search */}
      <div style={{ padding:'0 16px 12px' }}>
        <div style={{
          background: C.card, borderRadius: 12, padding:'9px 12px',
          display:'flex', alignItems:'center', gap: 8,
          border:`1px solid ${C.border}`
        }}>
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <circle cx="6" cy="6" r="4.5" stroke={C.textDim} strokeWidth="1.4"/>
            <path d="M9.5 9.5l2.5 2.5" stroke={C.textDim} strokeWidth="1.4" strokeLinecap="round"/>
          </svg>
          <span style={{ fontSize: 14, color: C.textDim }}>Search apps…</span>
        </div>
      </div>

      {/* Category filter chips */}
      <div style={{ display:'flex', gap: 8, padding:'0 16px 14px', overflowX:'auto' }}>
        {['All','Social','Video','Gaming','Shopping','Messaging'].map((cat, i) => (
          <div key={cat} style={{
            padding:'5px 12px', borderRadius: 20,
            background: i === 0 ? C.teal : C.card,
            color: i === 0 ? '#000' : C.textDim,
            fontSize: 12, fontWeight: 600, whiteSpace:'nowrap',
            border:`1px solid ${i === 0 ? C.teal : C.border}`
          }}>{cat}</div>
        ))}
      </div>

      {/* App list by category */}
      <div style={{ flex:1, overflowY:'auto', padding:'0 16px' }}>
        {categories.map(cat => (
          <div key={cat.label} style={{ marginBottom: 16 }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: C.textDim, letterSpacing: 1, textTransform:'uppercase', marginBottom: 8 }}>
              {cat.label}
            </div>
            <div style={{ background: C.card, borderRadius: 14, overflow:'hidden', border:`1px solid ${C.border}` }}>
              {cat.apps.map((app, i) => (
                <div key={app.name} style={{
                  display:'flex', alignItems:'center', gap: 12, padding:'10px 14px',
                  borderBottom: i < cat.apps.length-1 ? `1px solid ${C.separator}` : 'none'
                }}>
                  <AppDot name={app.name} color={app.color} />
                  <span style={{ flex:1, fontSize: 14, fontWeight: 500, color: C.text }}>{app.name}</span>
                  {/* checkmark for selected */}
                  {(app.name === 'Facebook' || app.name === 'Safari') ? (
                    <div style={{ width: 24, height: 24, borderRadius: 8, background: C.teal, display:'flex', alignItems:'center', justifyContent:'center' }}>
                      <svg width="12" height="10" viewBox="0 0 12 10" fill="none">
                        <path d="M1 5l3.5 3.5L11 1" stroke="#000" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                      </svg>
                    </div>
                  ) : (
                    <div style={{ width: 24, height: 24, borderRadius: 8, background: C.cardElevated, border:`1px solid ${C.border}` }}/>
                  )}
                </div>
              ))}
            </div>
          </div>
        ))}
      </div>
    </div>
  )
}

/* ═══════════════════════════════════════════
   APP DETAIL SCREEN — Redesigned
═══════════════════════════════════════════ */
const AppDetail = () => {
  const days = ['M','T','W','T','F','S','S']
  const blocked = [true,true,true,true,true,false,false]
  const hours = [2.1, 0.2, 1.8, 0.0, 1.5, 3.2, 2.8]
  const maxH = Math.max(...hours)
  return (
    <div style={{ background: C.bg, height:'100%', overflowY:'auto', paddingBottom: 24 }}>
      {/* Header */}
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'12px 16px 0' }}>
        <div style={{ display:'flex', alignItems:'center', gap: 6, color: C.teal, fontSize: 14, fontWeight: 600 }}>
          <span>←</span> Back
        </div>
        <div style={{ fontSize: 13, color:'#FF6B6B', fontWeight: 600 }}>Remove</div>
      </div>

      {/* App identity */}
      <div style={{ display:'flex', alignItems:'center', gap: 14, padding:'16px 16px 20px' }}>
        <AppDot name="Instagram" color="#E1306C" size={52} />
        <div>
          <div style={{ fontSize: 22, fontWeight: 700, color: C.text, letterSpacing:'-0.5px' }}>Instagram</div>
          <Pill label="Social" color={C.purple} />
        </div>
      </div>

      {/* Weekly usage chart */}
      <div style={{ margin:'0 16px 12px', background: C.card, borderRadius: 16, padding:'14px', border:`1px solid ${C.border}` }}>
        <div style={{ fontSize: 12, fontWeight: 700, color: C.textDim, letterSpacing: 0.5, marginBottom: 12, textTransform:'uppercase' }}>
          Usage this week
        </div>
        <div style={{ display:'flex', alignItems:'flex-end', gap: 6, height: 52 }}>
          {hours.map((h, i) => (
            <div key={i} style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap: 4 }}>
              <div style={{
                width:'100%', borderRadius: 4,
                background: blocked[i] ? `${C.teal}55` : `${C.orange}88`,
                height:`${(h/maxH)*100}%`,
                border: blocked[i] ? `1px solid ${C.teal}66` : 'none',
                minHeight: h > 0 ? 4 : 0
              }}/>
            </div>
          ))}
        </div>
        <div style={{ display:'flex', gap: 6, marginTop: 6 }}>
          {days.map((d,i) => (
            <div key={i} style={{ flex:1, textAlign:'center', fontSize: 9, color: blocked[i] ? C.teal : C.textDim }}>{d}</div>
          ))}
        </div>
        <div style={{ display:'flex', gap: 12, marginTop: 10 }}>
          <div style={{ display:'flex', alignItems:'center', gap: 4 }}>
            <div style={{ width: 8, height: 8, borderRadius: 2, background: `${C.teal}88` }}/>
            <span style={{ fontSize: 10, color: C.textDim }}>Blocked</span>
          </div>
          <div style={{ display:'flex', alignItems:'center', gap: 4 }}>
            <div style={{ width: 8, height: 8, borderRadius: 2, background: `${C.orange}88` }}/>
            <span style={{ fontSize: 10, color: C.textDim }}>Unblocked</span>
          </div>
        </div>
      </div>

      {/* Stats row */}
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap: 8, margin:'0 16px 12px' }}>
        {[
          { val:'11.2h', label:'Saved this week' },
          { val:'3.2h', label:'Opened today' },
          { val:'47', label:'Times blocked' },
        ].map(s => (
          <div key={s.label} style={{ background: C.card, borderRadius: 12, padding:'12px 8px', textAlign:'center', border:`1px solid ${C.border}` }}>
            <div style={{ fontSize: 15, fontWeight: 700, color: C.text }}>{s.val}</div>
            <div style={{ fontSize: 9, color: C.textDim, marginTop: 3, lineHeight: 1.3 }}>{s.label}</div>
          </div>
        ))}
      </div>

      {/* Block settings */}
      <div style={{ margin:'0 16px 10px' }}>
        <div style={{ fontSize: 11, fontWeight: 700, color: C.textDim, letterSpacing: 1, textTransform:'uppercase', marginBottom: 8 }}>
          Block Schedule
        </div>
        <div style={{ background: C.card, borderRadius: 14, overflow:'hidden', border:`1px solid ${C.border}` }}>
          {/* Schedule group link */}
          <div style={{ display:'flex', alignItems:'center', gap: 12, padding:'12px 14px', borderBottom:`1px solid ${C.separator}` }}>
            <div style={{ flex:1 }}>
              <div style={{ fontSize: 14, fontWeight: 600, color: C.text }}>Weekdays</div>
              <div style={{ fontSize: 11, color: C.textDim }}>9am – 6pm · Mon–Fri</div>
            </div>
            <Pill label="In group" color={C.teal} />
          </div>
          {/* Block forever */}
          <div style={{ display:'flex', alignItems:'center', gap: 12, padding:'12px 14px' }}>
            <div style={{ flex:1 }}>
              <div style={{ fontSize: 14, fontWeight: 600, color: C.text }}>Block Forever</div>
              <div style={{ fontSize: 11, color: C.textDim }}>Override — always blocked</div>
            </div>
            <Toggle on={false} />
          </div>
        </div>
      </div>

      {/* Mindfulness prompt */}
      <div style={{ margin:'0 16px', padding:'14px', borderRadius: 14, background:`${C.teal}12`, border:`1px solid ${C.tealDimBorder}` }}>
        <div style={{ fontSize: 12, fontWeight: 600, color: C.teal, marginBottom: 4 }}>Why you blocked this</div>
        <div style={{ fontSize: 13, color: C.textDim, lineHeight: 1.5 }}>"I want to be more present and stop mindless scrolling."</div>
      </div>
    </div>
  )
}

/* ═══════════════════════════════════════════
   MAIN RENDER
═══════════════════════════════════════════ */
const App = () => (
  <DesignCanvas title="sami — Wireframe Directions">

    <DCSection id="dash" title="Dashboard — 3 Directions">
      <DCArtboard id="a" label="A · Calm Focus" width={390} height={780}>
        <IOSDevice dark width={390} height={780}>
          <DashA />
        </IOSDevice>
      </DCArtboard>
      <DCArtboard id="b" label="B · Stats Grid" width={390} height={780}>
        <IOSDevice dark width={390} height={780}>

      <DCArtboard id="c" label="C · Mindful + Ambient" width={390} height={780}>

    <DCSection id="other" title="Other Screens — Redesigned">

    </DCSection>

    <DCSection id="notes" title="Design Notes">
      <DCArtboard id="n1" label="Issues Identified" width={320} height={420}>
        <div style={{ background:'#1a1a1a', padding: 20, height:'100%', fontFamily:'Space Grotesk' }}>
          <div className="sketch" style={{ fontSize: 22, color:'#fff', fontWeight: 700, marginBottom: 16 }}>Issues Found</div>
          {[
            ['Dashboard','No motivation layer — streak, score, time saved missing'],
            ['Dashboard','Groups unclear — small pill label gets lost in layout'],
            ['Dashboard','Flat list mixes grouped + ungrouped apps with no hierarchy'],
            ['Block Sheet','Only 2 apps shown — feels unfinished'],
            ['Block Sheet','Initials placeholders lower trust & scannability'],
            ['Block Sheet','No categories — hard to find apps quickly'],
            ['App Detail','Mostly empty below the toggle'],
            ['App Detail','No stats, no schedule context, no insight'],
          ].map(([screen, note]) => (
            <div key={note} style={{ display:'flex', gap: 10, marginBottom: 10 }}>
              <div style={{
                padding:'2px 7px', borderRadius: 6, background:'#2c2c2c',
                fontSize: 10, color:'#00C9A7', fontWeight: 700, whiteSpace:'nowrap', height: 'fit-content', marginTop: 2
              }}>{screen}</div>
              <div className="sketch" style={{ fontSize: 13, color:'#ccc', lineHeight: 1.5 }}>{note}</div>

          ))}
        </div>
      </DCArtboard>
      <DCArtboard id="n2" label="Direction Comparison" width={320} height={420}>
        <div style={{ background:'#1a1a1a', padding: 20, height:'100%', fontFamily:'Space Grotesk' }}>
          <div className="sketch" style={{ fontSize: 22, color:'#fff', fontWeight: 700, marginBottom: 16 }}>Directions</div>
          {[
            { letter:'A', title:'Calm Focus', color:'#00C9A7', notes:['Focus ring as hero — calming, Opal-like','Minimal stats below ring','Clean grouped list','Best for users who want clarity'] },
            { letter:'B', title:'Stats Grid', color:'#FFD93D', notes:['Data-rich 3-metric header','Groups as cards with active state','Most info-dense of the three','Best for power users'] },
            { letter:'C', title:'Mindful + Ambient', color:'#8B5CF6', notes:['Gradient hero with weekly bar chart','Groups as session-style cards','Motivational copy up front','Best for habit-building narrative'] },
          ].map(d => (
            <div key={d.letter} style={{ marginBottom: 14 }}>
              <div style={{ display:'flex', alignItems:'center', gap: 8, marginBottom: 4 }}>
                <div style={{ width: 22, height: 22, borderRadius: 6, background: d.color, display:'flex', alignItems:'center', justifyContent:'center', fontSize: 12, fontWeight: 800, color:'#000' }}>{d.letter}</div>
                <div className="sketch" style={{ fontSize: 16, color:'#fff', fontWeight: 700 }}>{d.title}</div>
              </div>
              {d.notes.map(n => <div key={n} className="sketch" style={{ fontSize: 12, color:'#999', paddingLeft: 30, lineHeight: 1.6 }}>· {n}</div>)}

  </DesignCanvas>
)

ReactDOM.createRoot(document.getElementById('root')).render(<App />)
</script>
